services:
  snapcd-agent:
    image: ghcr.io/schrieksoft/snapcd/snapcd-agent:1.5.1
    container_name: snapcd-agent
    restart: unless-stopped
    depends_on:
      - snapcd-agent-sidecar-claude
    volumes:
      - ./config/appsettings.json:/app/appsettings.json:ro
      # Optional: layer environment-specific overrides on top of the committed defaults.
      # Create components/agent/config/appsettings.Production.json (gitignored).
      - ./config/appsettings.Production.json:/app/appsettings.Production.json:ro
    networks:
      - snapcd-net

  snapcd-agent-sidecar-claude:
    image: ghcr.io/schrieksoft/snapcd/snapcd-agent-sidecar-claude:1.5.1
    container_name: snapcd-agent-sidecar-claude
    restart: unless-stopped
    environment:
      # The sidecar reaches Snap CD Server for MCP via the same hostname the agent uses.
      SNAPCD_SERVER_URL: "http://snapcd-server:8080"
      # Provide the Anthropic API key for the Claude SDK. Leave empty to use a BYOK credential
      # configured on the Agent resource (the sidecar will fetch it from the server at mission time).
      ANTHROPIC_API_KEY: ""
    networks:
      - snapcd-net

networks:
  snapcd-net:
